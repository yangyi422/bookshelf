name: bookshelf-simple

services:
  bookshelf:
    image: ghcr.io/yangyi422/bookshelf:latest
    ports:
      - "8088:8080"
    environment:
      APP_ENV: production
      DATA_DIR: /app/data
      WEB_DIR: /app/web
    volumes:
      - bookshelf_data:/app/data
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/api/v1/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bookshelf_data:
