services:
  bookshelf:
    build:
      context: ../backend
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    env_file: ../.env
    restart: unless-stopped
    init: true
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:size=64m,mode=1777"]
    volumes:
      - ${DATA_HOST_PATH:-/opt/bookshelf/data}:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options: {max-size: "10m", max-file: "3"}
  frontend:
    build: ../frontend
    restart: unless-stopped
    init: true
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options: {max-size: "10m", max-file: "3"}
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      bookshelf: {condition: service_healthy}
      frontend: {condition: service_healthy}
    ports: ["80:80", "443:443"]
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options: {max-size: "10m", max-file: "3"}
volumes:
  caddy_data:
  caddy_config:
